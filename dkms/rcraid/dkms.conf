# DKMS config for the rcraid kernel-port package.
# Built from AMD 9.3.0 source (raid_linux_driver_930_00276) + 6.14 patches.
#
# The proprietary rcblob.x86_64 binary MUST be present in src/ before
# `dkms add`. See scripts/fetch-and-extract-rcblob.sh.

PACKAGE_NAME="rcraid"
PACKAGE_VERSION="9.3.0-6.14"

BUILT_MODULE_NAME[0]="rcraid"
BUILT_MODULE_LOCATION[0]=""
DEST_MODULE_LOCATION[0]="/kernel/drivers/scsi/"

# Makefile's `all` target builds the module. rcblob_pre creates the
# rcblob.x86_64.o symlink that the kernel build system expects to link.
MAKE[0]="make KVERS=${kernelver} KBUILD_SRC=${kernel_source_dir} all"

# Best-effort module parameters — see /etc/modprobe.d/rcraid.conf for permanent values.
# rc_adapter_count should equal the number of RAID-member NVMe SSDs
# (BIOS-visible RAID Bottom Devices MINUS any non-RAID NVMe, e.g. the boot disk).
# tag_q_depth=64 raises the per-LUN queue depth from the stock 16 — improves
# random write throughput meaningfully.
#
# Default modprobe.d snippet we recommend:
#   options rcraid rc_adapter_count=4 tag_q_depth=64

AUTOINSTALL="no"

POST_INSTALL="post_install.sh"
POST_REMOVE="post_remove.sh"
